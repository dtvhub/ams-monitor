name: AMS Monitor

on:
  schedule:
    - cron: "*/15 * * * *"   # runs every 15 minutes
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run AMS monitor
      id: ams
      run: |
        python3 main.py > output.txt

        # Extract ONLY the last line (NEW_EVENT or NO_EVENT)
        RESULT=$(tail -n 1 output.txt | tr -d '\r')

        echo "result=$RESULT" >> $GITHUB_OUTPUT

    - name: Send ntfy alert
      if: contains(steps.ams.outputs.result, 'NEW_EVENT')
      run: |
        curl -d "New meteor detected!" https://ntfy.sh/ams-monitor-ntfy-7f2c9e41bd
