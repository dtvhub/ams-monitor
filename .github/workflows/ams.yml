name: AMS Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: List repo files
      run: |
        echo "=== FILE TREE ==="
        ls -R .

    - name: Run AMS monitor (show raw output)
      id: ams
      run: |
        python3 main.py > output.txt
        RESULT=$(tail -n 1 output.txt | tr -d '\r')
        echo "result=$RESULT" >> $GITHUB_OUTPUT

    - name: Send ntfy alert if NEW_EVENT
      if: steps.ams.outputs.result == 'NEW_EVENT'
      run: |
        curl -d "🚨 New Meteor Event Detected!" https://ntfy.sh/ams-monitor-ntfy-7f2c9e41bd
