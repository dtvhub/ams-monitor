name: AMS Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ams-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AMS monitor script
        run: |
          python main.py > output.txt
          echo "--- Script Output ---"
          cat output.txt

      - name: Export script output to env (safe multiline)
        run: |
          while IFS='=' read -r key value; do
            if [ -n "$key" ]; then
              echo "Setting $key"
              {
                echo "$key<<EOF"
                echo "$value"
                echo "EOF"
              } >> $GITHUB_ENV
            fi
          done < output.txt

      - name: Debug env vars
        run: |
          echo "STATUS: $STATUS"
          echo "REPORTS: $REPORTS"
          echo "AGE: $AGE"
          echo "SUMMARY:"
          echo "$SUMMARY"

      - name: Send ntfy notification
        if: ${{ env.STATUS == 'NORMAL' || env.STATUS == 'HIGH' }}
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: |
          if [ "${STATUS}" = "HIGH" ]; then
            PRIORITY=4
          else
            PRIORITY=3
          fi

          TITLE="☄️ AMS Meteor Event Confirmed"
          BODY="${SUMMARY}

Event age: ${AGE}"

          echo "Sending notification..."
          echo "Priority: $PRIORITY"
          echo "Body:"
          echo "$BODY"

          curl \
           
