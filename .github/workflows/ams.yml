name: AMS Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ams-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AMS monitor script
        run: |
          python main.py > output.txt

      - name: Export script output to env
        run: |
          while IFS='=' read -r key value; do
            if [ -n "$key" ]; then
              echo "$key=$value" >> $GITHUB_ENV
            fi
          done < output.txt

      - name: Send ntfy notifications for all events
        id: notify
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: |
          ALERT_SENT=false

          for i in 1 2 3 4 5; do
            TYPE_VAR="EVENT_${i}_EVENT_TYPE"
            SUMMARY_VAR="EVENT_${i}_SUMMARY"
            URL_VAR="EVENT_${i}_URL"

            EVENT_TYPE="${!TYPE_VAR}"
            SUMMARY="${!SUMMARY_VAR}"
            URL="${!URL_VAR}"

            if [ -z "$EVENT_TYPE" ]; then
              continue
            fi

            if [ "$EVENT_TYPE" = "NEW" ]; then
              curl -H "Title: NEW Meteor Event" -H "Priority: 4" -d "NEW: $SUMMARY\nLink: $URL" "$NTFY_URL"
              ALERT_SENT=true
            fi

            if [ "$EVENT_TYPE" = "UPDATED" ]; then
              curl -H "Title: Meteor Event Updated" -H "Priority: 3" -d "UPDATED: $SUMMARY\nLink: $URL" "$NTFY_URL"
              ALERT_SENT=true
            fi
          done

          echo "ALERT_SENT=$ALERT_SENT" >> $GITHUB_ENV

      - name: Commit updated memory file
        if: env.ALERT_SENT == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add events.json || true

          if ! git diff --cached --quiet; then
            git commit -m "Update events.json [skip ci]"
            git push
          fi
