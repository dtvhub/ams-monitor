name: AMS Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ams-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AMS monitor script
        run: |
          python main.py > output.txt

      - name: Export script output to env
        run: |
          while IFS='=' read -r key value; do
            if [ -n "$key" ]; then
              echo "$key=$value" >> $GITHUB_ENV
            fi
          done < output.txt

      # ---------------------------------------------------------
      # ⭐ Send notifications for EACH event that qualifies
      # ---------------------------------------------------------
      - name: Send ntfy notifications for all events
        id: notify
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: |
          ALERT_SENT=false

          for i in 1 2 3 4 5; do
            STATUS_VAR="EVENT_${i}_STATUS"
            UNCHANGED_VAR="EVENT_${i}_UNCHANGED"
            WINDOW_VAR="EVENT_${i}_INSIDE_WINDOW"
            TYPE_VAR="EVENT_${i}_EVENT_TYPE"
            SUMMARY_VAR="EVENT_${i}_SUMMARY"

            STATUS="${!STATUS_VAR}"
            UNCHANGED="${!UNCHANGED_VAR}"
            INSIDE_WINDOW="${!WINDOW_VAR}"
            EVENT_TYPE="${!TYPE_VAR}"
            SUMMARY="${!SUMMARY_VAR}"

            # Skip if event doesn't exist
            if [ -z "$STATUS" ]; then
              continue
            fi

            # Apply your alert rules
            if { [ "$STATUS" = "REGULAR" ] || [ "$STATUS" = "HIGH" ]; } \
              && [ "$UNCHANGED" = "NO" ] \
              && [ "$INSIDE_WINDOW" = "YES" ]; then

              # Priority
              if [ "$STATUS" = "HIGH" ]; then
                PRIORITY=4
                BULLET="🔺"
              else
                PRIORITY=3
                BULLET="🔸"
              fi

              # Title
              if [ "$EVENT_TYPE" = "UPDATED" ]; then
                TITLE="☄️ Meteor Report Updated"
              else
                TITLE="☄️ NEW Meteor Report Confirmed"
              fi

              BODY="${BULLET} ${SUMMARY}"

              curl \
                -H "Title: ${TITLE}" \
                -H "Priority: ${PRIORITY}" \
                -d "${BODY}" \
                "${NTFY_URL}"

              ALERT_SENT=true
            fi
          done

          echo "ALERT_SENT=$ALERT_SENT" >> $GITHUB_ENV

      # ---------------------------------------------------------
      # ⭐ Commit updated events.json ONLY if alerts were sent
      # ---------------------------------------------------------
      - name: Commit updated memory file
        if: env.ALERT_SENT == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add events.json || true

          if ! git diff --cached --quiet; then
            git commit -m "Update events.json [skip ci]"
            git push
          fi
