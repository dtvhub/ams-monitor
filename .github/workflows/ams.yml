name: AMS Monitor

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes
  workflow_dispatch:

jobs:
  ams-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AMS monitor script
        run: |
          python main.py > output.txt

      - name: Export script output to env
        run: |
          while IFS='=' read -r key value; do
            if [ -n "$key" ]; then
              echo "$key=$value" >> $GITHUB_ENV
            fi
          done < output.txt

      - name: Send ntfy notification
        if: ${{ (env.STATUS == 'NORMAL' || env.STATUS == 'HIGH') && env.UNCHANGED == 'NO' }}
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: |
          # Determine priority
          if [ "${STATUS}" = "HIGH" ]; then
            PRIORITY=4
          else
            PRIORITY=3
          fi

          # Dynamic title based on event type
          if [ "${EVENT_TYPE}" = "UPDATED" ]; then
            TITLE="☄️ AMS Meteor Event Updated"
          else
            TITLE="☄️ AMS Meteor Event Confirmed"
          fi

          BODY="${SUMMARY}"

          curl \
            -H "Title: ${TITLE}" \
            -H "Priority: ${PRIORITY}" \
            -d "${BODY}" \
            "${NTFY_URL}"
