name: AMS Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ams-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AMS monitor script
        run: |
          python main.py > output.txt

      - name: Export script output to env
        run: |
          while IFS='=' read -r key value; do
            if [ -n "$key" ]; then
              echo "$key=$value" >> $GITHUB_ENV
            fi
          done < output.txt

      # ⭐ Send alert BEFORE updating memory
      - name: Send ntfy notification
        id: notify
        if: ${{ (env.STATUS == 'REGULAR' || env.STATUS == 'HIGH')
              && env.UNCHANGED == 'NO'
              && env.INSIDE_WINDOW == 'YES' }}
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: |
          if [ "${STATUS}" = "HIGH" ]; then
            PRIORITY=4
          else
            PRIORITY=3
          fi

          if [ "${EVENT_TYPE}" = "UPDATED" ]; then
            TITLE="☄️ Meteor Report Updated"
          else
            TITLE="☄️ NEW Meteor Report Confirmed"
          fi

          if [ "${STATUS}" = "HIGH" ]; then
            BULLET="🔺"
          else
            BULLET="🔸"
          fi

          BODY="${BULLET} ${SUMMARY}"

          curl \
            -H "Title: ${TITLE}" \
            -H "Priority: ${PRIORITY}" \
            -d "${BODY}" \
            "${NTFY_URL}"

      # ⭐ Only update memory IF the alert step actually ran
      - name: Commit updated memory files
        if: ${{ steps.notify.conclusion == 'success' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add last_summary.txt last_event_url.txt || true

          if ! git diff --cached --quiet; then
            git commit -m "Update memory files [skip ci]"
            git push
          fi
