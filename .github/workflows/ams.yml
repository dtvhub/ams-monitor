name: AMS Monitor

on:
  schedule:
    - cron: "*/15 * * * *"   # runs every 15 minutes
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: |
        pip install requests

    - name: List repo files
      run: |
        echo "=== FILE TREE ==="
        ls -R .

    - name: Run AMS monitor (show raw output)
      id: ams
      run: |
        python3 main.py
